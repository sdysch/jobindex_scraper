name: Classify

on:
  schedule:
    - cron: '5,35 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv run jobindex-classify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_CRITERIA: ${{ secrets.JOB_CRITERIA }}
